name: Python API Tests

# 1. ¿Cuándo se va a ejecutar este flujo?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. ¿Qué va a hacer?
jobs:
  run-tests:
    runs-on: ubuntu-latest # Ejecuta en una máquina virtual Linux ligera

    steps:
    # Paso 1: Descargar el código del repositorio en la máquina virtual
    - name: Checkout code
      uses: actions/checkout@v4

    # Paso 2: Instalar Python en la máquina virtual
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # La versión que estás usando

    # Paso 3: Instalar las dependencias de tu proyecto
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Paso 4: Ejecutar los tests con reporte de cobertura
    - name: Run Tests with Pytest
      run: |
        python -m pytest --cov=api --cov=validation --cov-report=term-missing