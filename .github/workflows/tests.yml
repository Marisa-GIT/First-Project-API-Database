name: Python API Tests

# 1. When is this flow going to be executed?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. What are you going to do?
jobs:
  run-tests:
    runs-on: ubuntu-latest # Runs on a lightweight Linux virtual machine
    steps:
    # Step 1: Download the code from the repository to the virtual machine
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Install Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # The version you are using

    # Step 3: Install your project's dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run the tests with coverage report
    - name: Run Tests with Pytest
      run: |
        python -m pytest --cov=api --cov=validation --cov-report=term-missing